<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 5rem;
      background-color: #f8f9fa;
      color: #333;
    }
    h1 {
      font-size: 4rem;
      color: #e74c3c;
      margin-bottom: 0;
    }
    p {
      font-size: 1.2rem;
      color: #7f8c8d;
    }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 10px 20px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

<h1>404</h1>
<h2>Car Not Found</h2>
<p>Oops! The car you are looking for doesn't exist or has been removed.</p>

<a href="/" class="btn">Return to Car List</a>

</body>
</html>
